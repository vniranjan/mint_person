services:
  # ── PostgreSQL database ──
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mintuser
      POSTGRES_PASSWORD: mintpassword
      POSTGRES_DB: mintdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mintuser -d mintdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Azurite: Azure Storage emulator ──
  # Emulates: Blob Storage (:10000), Queue Storage (:10001), Table Storage (:10002)
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    restart: unless-stopped
    ports:
      - "10000:10000"  # Blob Storage
      - "10001:10001"  # Queue Storage
      - "10002:10002"  # Table Storage
    command: >
      azurite
      --blobHost 0.0.0.0
      --queueHost 0.0.0.0
      --tableHost 0.0.0.0
      --location /data
      --debug /data/debug.log
    volumes:
      - azurite_data:/data
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "10000"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Next.js web app ──
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mintuser:mintpassword@postgres:5432/mintdb?schema=public
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:-local-dev-secret-change-in-prod}
      AUTH_SECRET: ${AUTH_SECRET:-local-dev-secret-change-in-prod}
      AZURE_STORAGE_CONNECTION_STRING: >-
        DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tiqXNE==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;
      AZURE_QUEUE_NAME: statement-processing
      AZURE_BLOB_CONTAINER_NAME: statements
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Python AI worker ──
  worker:
    build:
      context: ./apps/worker
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      azurite:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://mintuser:mintpassword@postgres:5432/mintdb
      AZURE_STORAGE_CONNECTION_STRING: >-
        DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tiqXNE==;BlobEndpoint=http://azurite:10000/devstoreaccount1;QueueEndpoint=http://azurite:10001/devstoreaccount1;
      AZURE_QUEUE_NAME: statement-processing
      AZURE_BLOB_CONTAINER_NAME: statements
      LLM_MODEL: ${LLM_MODEL:-anthropic/claude-haiku-4-5-20251001}
      LLM_API_KEY: ${LLM_API_KEY:-}
      ENVIRONMENT: production
      LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  azurite_data:
